<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="domashka" />
    <title>Твоя Домашка</title>
    <link rel="icon" type="image/png" href="./favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
    <link rel="shortcut icon" href="./favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./favicon/site.webmanifest" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Лоадер -->
    <div id="loader">
        <img src="./favicon/web-app-manifest-512x512.png" alt="Loader Logo" class="loader-logo">
    </div>

    <div id="content" style="display: none;">
        <header>
            <h1 class="focus-in-expand-fwd">Твоя Домашка</h1>
            <p class="header-subtitle">Разом у вірі</p>
        </header>
        <div class="container">
            <main>
                <button id="getVerse">
                    <span class="btn-icon">✨</span>
                    <span class="btn-text">Слово дня</span>
                    <span class="btn-arrow">›</span>
                </button>
                <button id="showQuestionGenerator">
                    <span class="btn-icon">💬</span>
                    <span class="btn-text">Запитання для обговорення</span>
                    <span class="btn-arrow">›</span>
                </button>
                <button id="nextQuestion" style="display:none;">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">Наступне питання</span>
                </button>
                <button id="showGames" style="display:flex;">
                    <span class="btn-icon">🎮</span>
                    <span class="btn-text">Ігри для компанії</span>
                    <span class="btn-arrow">›</span>
                </button>
                <button id="showQr">
                    <span class="btn-icon">📲</span>
                    <span class="btn-text">Показати QR Code</span>
                    <span class="btn-arrow">›</span>
                </button>

                <div id="gamesSection" style="display:none;">
                    <h3>Ігри для домашки</h3>
                    <div class="games-grid">
                        <a href="#" class="game-link" data-game="guess-word">
                            <span class="game-icon">🔤</span>
                            <span>Вгадай слово</span>
                        </a>
                        <a href="#" class="game-link" data-game="alias">
                            <span class="game-icon">🗣️</span>
                            <span>Еліас</span>
                        </a>
                        <a href="#" class="game-link" data-game="bible-quiz">
                            <span class="game-icon">📖</span>
                            <span>Вікторина</span>
                        </a>
                        <a href="#" class="game-link" data-game="challenge">
                            <span class="game-icon">⚡</span>
                            <span>Добра справа</span>
                        </a>
                    </div>

                    <!-- Модальне вікно для ігор -->
                    <div id="gameModal"
                        style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:10000; align-items:center; justify-content:center;">
                        <div id="gameModalContent"
                            style="max-width:95vw; width:370px; min-height:180px; padding:24px 18px 18px 18px; position:relative;">
                            <button id="closeGameModal"
                                style="position:absolute; top:12px; right:12px;">&times;</button>
                            <div id="gameContent"></div>
                        </div>
                    </div>
                </div>

                <div id="questionContainer"></div>
                <div id="verseContainer"></div>
                <img id="qrImage" src="qr-code.png" alt="QR Code" style="display: none;">
                <button id="backButton" style="display: none;">
                    <span class="btn-icon">←</span>
                    <span class="btn-text">Назад</span>
                </button>
            </main>
        </div>

        <div class="tracking-in-expand-fwd-bottom">
            <footer>
                <p class="footer-text">Developed by <a href="https://www.instagram.com/dmitry_beresten"
                        target="_blank">Dima
                        Beresten</a></p>
                <p class="footer-version">Version 1.0</p>
            </footer>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="domashka.js"></script>
</body>

</html>
